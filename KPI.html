<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        background: #4500a4;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 40px;
        width: 2550px;
        height: 1376px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
      }
      .table {
        display: table;
        border-collapse: collapse;
        width: 100%;
        flex: 1;
      }
      .row {
        display: table-row;
      }
      .cell {
        display: table-cell;
        width: 33.33%;
        padding: 20px;
        border: 2px solid #4500a4;
        vertical-align: middle;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .label-cell {
        background: #ffffff;
        color: #4500a4;
        font-weight: bold;
        font-size: 42px;
      }
      .value-cell {
        background: #86cac6;
        color: #4500a4;
        font-size: 80px;
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>    <div class="table">
      <div class="row"><div class="cell label-cell">Negotiation ongoing</div>
<div class="cell label-cell">Site contracted</div>
<div class="cell label-cell">Connection secured</div>
</div>
      <div class="row"><div class="cell value-cell">7</div>
<div class="cell value-cell">2</div>
<div class="cell value-cell">2</div>
</div>
    </div>
    <div style="height:40px;"></div>
    <div class="table">
      <div class="row"><div class="cell label-cell">Permit filed</div>
<div class="cell label-cell">Under construction</div>
<div class="cell label-cell">Operational</div>
</div>
      <div class="row"><div class="cell value-cell">0</div>
<div class="cell value-cell">0</div>
<div class="cell value-cell">0</div>
</div>
    </div>
  </body>
</html>
