<html>
  <head>
<meta http-equiv="refresh" content="60">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <meta charset="utf-8">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
    <style>
      body {
  background: #4500a4;
  font-family: 'Satoshi', system-ui, -apple-system, sans-serif;
  margin: 0;
  padding: 40px;
  width: 100%;
  height: 100vh;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  overflow: hidden;
}
      .table {
        display: table;
        border-collapse: collapse;
        width: 100%;
        flex: 1;
      }
      .row {
        display: table-row;
      }
      .cell {
        display: table-cell;
        width: 33.33%;
        padding: 20px;
        border: 6px solid #4500a4;
        vertical-align: middle;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
     .label-cell {
  background: #86cac6;
  color: #4500a4;
  font-weight: 900;
  font-size: 40px;
}
      .value-cell {
        background: #ffffff;
        color: #4500a4;
        font-size: 100px;
        text-align: center;
        font-weight: 900;
      }
    </style>
  </head>
  <body>    <div class="table">
      <div class="row"><div class="cell label-cell">Negotiation ongoing</div>
<div class="cell label-cell">Site contracted</div>
<div class="cell label-cell">Connection secured</div>
</div>
      <div class="row"><div class="cell value-cell">19</div>
<div class="cell value-cell">4</div>
<div class="cell value-cell">0</div>
</div>
    </div>
    <div style="height:20px;"></div>
    <div class="table">
      <div class="row"><div class="cell label-cell">Permit filed</div>
<div class="cell label-cell">Under construction</div>
<div class="cell label-cell">Operational</div>
</div>
      <div class="row"><div class="cell value-cell">0</div>
<div class="cell value-cell">0</div>
<div class="cell value-cell">0</div>
</div>
    </div>
  </body>
</html>
