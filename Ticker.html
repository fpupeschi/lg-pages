<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=3840, height=100, initial-scale=1.0">
<title>Latitude News</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 3840px;
    height: 100px;
    overflow: hidden;
    background: #86cac6;
    font-family: 'Satoshi', sans-serif;
  }

  .ticker-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .ticker-label {
    position: relative;
    z-index: 2;
    flex-shrink: 0;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 48px;
    background: #4500a4;
    color: #ffffff;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ticker-label::after {
    content: '';
    position: absolute;
    right: -40px;
    top: 0;
    width: 40px;
    height: 100%;
    background: linear-gradient(to right, rgba(69, 0, 164, 0.25), transparent);
    pointer-events: none;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
    animation: scroll var(--duration, 60s) linear infinite;
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    padding: 0 24px;
    font-size: 42px;
    font-weight: 500;
    color: #4500a4;
    white-space: nowrap;
  }

  .ticker-separator {
    display: inline-flex;
    align-items: center;
    padding: 0 32px;
    color: #4500a4;
    font-size: 28px;
    opacity: 0.5;
  }

  .ticker-separator::before {
    content: '';
    display: block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4500a4;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-label">LATITUDE NEWS</div>
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<script>
/* ▼▼▼ POWER AUTOMATE INJECTION ZONE — START ▼▼▼ */
const TICKER_ITEMS = ["Energy Release 2.0: 116 imprese aggregate dal gruppo FIMM. Assegnati 1516 TWh in gestione a Latitude. Accordo con GreenGo per la realizzazione di 110 MW di nuova capacità fotovoltaica.","Energy Release 2.0: accordo tra GreenGo e Alfa Acciai per 70 MW di nuova capacità fotovoltaica. GreenGo esprime una quota pari a circa il 5,2% della capacità rinnovabile da installare con l’Energy Release."];
/* ▲▲▲ POWER AUTOMATE INJECTION ZONE — END ▲▲▲ */

const SPEED_PX_PER_SEC = 120;

function buildTicker() {
  const track = document.getElementById('tickerTrack');
  track.innerHTML = '';
  function createSet() {
    const frag = document.createDocumentFragment();
    TICKER_ITEMS.forEach((text) => {
      const item = document.createElement('span');
      item.className = 'ticker-item';
      item.textContent = text;
      frag.appendChild(item);
      const sep = document.createElement('span');
      sep.className = 'ticker-separator';
      frag.appendChild(sep);
    });
    return frag;
  }
  track.appendChild(createSet());
  track.appendChild(createSet());
  requestAnimationFrame(() => {
    const halfWidth = track.scrollWidth / 2;
    const duration = halfWidth / SPEED_PX_PER_SEC;
    track.style.setProperty('--duration', duration + 's');
  });
}

buildTicker();
</script>

</body>
</html>
